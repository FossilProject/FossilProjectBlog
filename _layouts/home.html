---
layout: default
---

<style>
  .hero {
    background: linear-gradient(135deg, #1a1508 0%, #0e0d0b 60%);
    border: 1px solid #2a2620;
    border-radius: 4px;
    padding: 3.5rem 2.5rem;
    margin-bottom: 3rem;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, #e8821a, transparent);
  }

  .hero h1 {
    font-size: 2.8rem;
    margin-bottom: 1rem;
    color: #f0ece4;
  }

  .hero h1 span {
    color: #e8821a;
  }

  .hero p {
    font-size: 1.1rem;
    color: #a09080;
    max-width: 520px;
    margin-bottom: 0;
  }

  .posts-header {
    font-family: 'Source Serif 4', serif;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #7a7060;
    margin-bottom: 1.5rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid #2a2620;
  }

  .post-list {
    list-style: none;
  }

  .post-list li {
    padding: 1.25rem 0;
    border-bottom: 1px solid #1e1c18;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 1rem;
  }

  .post-list li:last-child {
    border-bottom: none;
  }

  .post-list a {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 1.1rem;
    color: #f0ece4;
    text-decoration: none;
    transition: color 0.2s;
  }

  .post-list a:hover {
    color: #e8821a;
    text-decoration: none;
  }

  .post-list .post-date {
    font-size: 0.8rem;
    color: #7a7060;
    white-space: nowrap;
    letter-spacing: 0.04em;
  }
</style>

<div class="hero">
  <h1>Fossil<span>Project</span></h1>
  <p>Covering open source software that deserves more attention — from game development tools to the broader FOSS ecosystem.</p>
</div>

<p class="posts-header">Latest Posts</p>

<ul class="post-list">
  {% for post in site.posts %}
    <li>
      <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
      <span class="post-date">{{ post.date | date: "%b %d, %Y" }}</span>
    </li>
  {% endfor %}
</ul>

{{ content }}
