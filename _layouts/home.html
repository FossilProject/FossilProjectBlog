---
layout: default
---

<style>
  .hero {
    background: linear-gradient(135deg, #1a1508 0%, #0e0d0b 60%);
    border: 1px solid #2a2620;
    border-radius: 4px;
    padding: 3.5rem 2.5rem;
    margin-bottom: 2rem;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, #e8821a, transparent);
  }

  .hero h1 {
    font-size: 2.8rem;
    margin-bottom: 1rem;
    color: #f0ece4;
  }

  .hero h1 span { color: #e8821a; }

  .hero p {
    font-size: 1.1rem;
    color: #a09080;
    max-width: 520px;
  }

  .search-section { margin-bottom: 2.5rem; }

  .search-form {
    display: flex;
    border: 1px solid #2a2620;
    border-radius: 3px;
    overflow: hidden;
  }

  .search-form:focus-within { border-color:#e8821a; }

  .search-input {
    flex:1;
    background:#161410;
    border:none;
    padding:.85rem 1.25rem;
    color:#c8c0b0;
    font-family:'Source Serif 4', Georgia, serif;
    font-size:1rem;
    outline:none;
  }

  .search-input::placeholder { color:#4a4540; }

  .search-btn {
    background:#1a1508;
    border:none;
    border-left:1px solid #2a2620;
    padding:.85rem 1.25rem;
    color:#e8821a;
    cursor:pointer;
  }

  .search-btn:hover {
    background:#e8821a;
    color:#0e0d0b;
  }

  .posts-header {
    font-family:'Source Serif 4',serif;
    font-size:.8rem;
    text-transform:uppercase;
    letter-spacing:.12em;
    color:#7a7060;
    margin-bottom:1.5rem;
    padding-bottom:.75rem;
    border-bottom:1px solid #2a2620;
  }

  .post-list { list-style:none; }

  .post-list li {
    padding:1.25rem 0;
    border-bottom:1px solid #1e1c18;
    display:flex;
    justify-content:space-between;
  }

  .post-list a {
    font-family:'Playfair Display',Georgia,serif;
    font-size:1.1rem;
    color:#f0ece4;
    text-decoration:none;
  }

  .post-list a:hover { color:#e8821a; }

  .post-date {
    font-size:.8rem;
    color:#7a7060;
  }
</style>

<div class="hero">
  <h1>Fossil<span>Project</span></h1>
  <p>A hub for open source discovery, news, and the developers building a freer web.</p>
</div>

<div class="search-section">
  <form class="search-form" action="/search" method="get">
    <input class="search-input" type="text" name="q"
      placeholder="Search the web..." autocomplete="off">
    <button class="search-btn" type="submit">⌕</button>
  </form>
</div>

<p class="posts-header">Latest Posts</p>

<ul class="post-list">
{% for post in site.posts %}
<li>
<a href="{{ post.url | relative_url }}">{{ post.title }}</a>
<span class="post-date">{{ post.date | date: "%b %d, %Y" }}</span>
</li>
{% endfor %}
</ul>

<div class="news-section">
  <p class="posts-header">
    <span>FOSS News</span>
    <span id="news-updated" style="font-size:0.75rem;"></span>
  </p>

  <div class="news-source-tabs">
    <button class="news-tab active" onclick="loadFeed('phoronix', event)">Phoronix</button>
    <button class="news-tab" onclick="loadFeed('lwn', event)">LWN</button>
    <button class="news-tab" onclick="loadFeed('omgubuntu', event)">OMG Ubuntu</button>
    <button class="news-tab" onclick="loadFeed('fosspost', event)">FOSS Post</button>
  </div>

  <ul class="news-list" id="news-list">
    <li class="news-loading">Loading feed...</li>
  </ul>
</div>

<script>
const feeds = {
  phoronix:{url:'https://www.phoronix.com/rss.php',name:'Phoronix'},
  lwn:{url:'https://lwn.net/headlines/rss',name:'LWN.net'},
  omgubuntu:{url:'https://www.omgubuntu.co.uk/feed',name:'OMG Ubuntu'},
  fosspost:{url:'https://fosspost.org/feed',name:'FOSS Post'}
};

async function loadFeed(sourceKey,event){
document.querySelectorAll('.news-tab').forEach(t=>t.classList.remove('active'));
if(event)event.target.classList.add('active');

const list=document.getElementById('news-list');
list.innerHTML='<li class="news-loading">Loading feed...</li>';

const source=feeds[sourceKey];
const apiUrl=`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(source.url)}&count=10`;

try{
const response=await fetch(apiUrl);
const data=await response.json();

if(data.status!=='ok'||!data.items.length){
list.innerHTML='<li class="news-loading">Could not load feed.</li>';
return;
}

list.innerHTML=data.items.map(item=>{
const date=new Date(item.pubDate).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
return `
<li>
<a href="${item.link}" target="_blank" rel="noopener">${item.title}</a>
<span class="news-meta"><span>${source.name}</span> · ${date}</span>
</li>`;
}).join('');

document.getElementById('news-updated').textContent='Updated '+new Date().toLocaleTimeString();
}catch(err){
list.innerHTML='<li class="news-loading">Failed to load feed.</li>';
}
}

document.addEventListener('DOMContentLoaded',()=>loadFeed('phoronix',null));
</script>

{{ content }}
