<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --amber: #e8821a;
      --amber-dim: #a85d10;
      --bg: #0e0d0b;
      --bg-raise: #161410;
      --bg-border: #2a2620;
      --text: #c8c0b0;
      --text-dim: #7a7060;
      --text-bright: #f0ece4;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Source Serif 4', Georgia, serif;
      font-weight: 300;
      font-size: 1.1rem;
      line-height: 1.8;
    }

    /* HEADER */
    header {
      background-color: var(--bg-raise);
      border-bottom: 1px solid var(--bg-border);
      padding: 0 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .site-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 900;
      font-size: 1.3rem;
      color: var(--text-bright);
      text-decoration: none;
      letter-spacing: 0.02em;
    }

    .site-title span {
      color: var(--amber);
    }

    nav {
      display: flex;
      gap: 2rem;
    }

    nav a {
      color: var(--text-dim);
      text-decoration: none;
      font-family: 'Source Serif 4', serif;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    nav a:hover {
      color: var(--amber);
    }

    /* MAIN CONTENT */
    main {
      max-width: 740px;
      margin: 3rem auto;
      padding: 0 1.5rem;
    }

    h1, h2, h3 {
      font-family: 'Playfair Display', Georgia, serif;
      color: var(--text-bright);
      line-height: 1.25;
    }

    h1 { font-size: 2.2rem; margin-bottom: 1rem; }
    h2 { font-size: 1.5rem; margin: 2.5rem 0 0.75rem; }
    h3 { font-size: 1.2rem; margin: 2rem 0 0.5rem; }

    p { margin-bottom: 1.25rem; }

    a {
      color: var(--amber);
      text-decoration: none;
    }

    a:hover {
      color: var(--text-bright);
      text-decoration: underline;
    }

    hr {
      border: none;
      border-top: 1px solid var(--bg-border);
      margin: 2.5rem 0;
    }

    /* POST META */
    .post-meta {
      font-size: 0.85rem;
      color: var(--text-dim);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--bg-border);
    }

    .post-meta span {
      color: var(--amber);
    }

    /* CODE */
    code {
      font-family: 'Courier New', monospace;
      background: var(--bg-raise);
      color: var(--amber);
      padding: 0.15em 0.4em;
      border-radius: 3px;
      font-size: 0.9em;
    }

    pre {
      background: var(--bg-raise);
      border-left: 3px solid var(--amber);
      padding: 1.25rem;
      overflow-x: auto;
      margin: 1.5rem 0;
      border-radius: 0 4px 4px 0;
    }

    pre code {
      background: none;
      padding: 0;
      color: var(--text);
    }

    /* FOOTER */
    footer {
      background-color: var(--bg-raise);
      border-top: 1px solid var(--bg-border);
      padding: 2rem;
      text-align: center;
      margin-top: 5rem;
      font-size: 0.85rem;
      color: var(--text-dim);
    }

    footer a {
      color: var(--amber-dim);
    }

    footer a:hover {
      color: var(--amber);
    }

    .footer-divider {
      margin: 0 0.75rem;
      color: var(--bg-border);
    }
  </style>
</head>
<body>

  <header>
    <a href="{{ '/' | relative_url }}" class="site-title">Fossil<span>Project</span></a>
    <nav>
      <a href="{{ '/' | relative_url }}">Home</a>
      <a href="{{ '/about/' | relative_url }}">About</a>
      <a href="{{ '/contact/' | relative_url }}">Contact</a>
    </nav>
  </header>

  <main>
    {% if page.date %}
    <div class="post-meta">
      <span>{{ page.date | date: "%B %d, %Y" }}</span>
      {% if page.author %} &nbsp;·&nbsp; {{ page.author }}{% endif %}
    </div>
    {% endif %}
    {{ content }}
    <script src="https://giscus.app/client.js"
        data-repo="FossilProject/FossilProjectBlog"
        data-repo-id="R_kgDORp4yUw"
        data-category="Announcements"
        data-category-id="DIC_kwDORp4yU84C4txY"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="bottom"
        data-theme="dark_dimmed"
        data-lang="en"
        crossorigin="anonymous"
        async>
    </script>
  </main>

  <footer>
    <p>
      © {{ site.time | date: "%Y" }} {{ site.title }}
      <span class="footer-divider">|</span>
      Written by {{ site.author }}
      <span class="footer-divider">|</span>
      <a href="mailto:support@fossilproject.org">support@fossilproject.org</a>
    </p>
  </footer>

</body>
</html>
