<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <style>
    body {
      background-color: #0d0d0d;
      color: #c9c9c9;
      font-family: Georgia, serif;
      margin: 0;
      padding: 0;
    }

    header {
      background-color: #1a1a1a;
      padding: 1rem 2rem;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header a {
      color: #c9c9c9;
      text-decoration: none;
    }

    header .site-title {
      font-size: 1.4rem;
      font-weight: bold;
      color: #ffffff;
    }

    nav a {
      margin-left: 1.5rem;
      color: #aaaaaa;
      text-decoration: none;
      font-size: 0.95rem;
    }

    nav a:hover {
      color: #ffffff;
    }

    main {
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }

    footer {
      background-color: #1a1a1a;
      border-top: 1px solid #333;
      text-align: center;
      padding: 1.5rem;
      font-size: 0.85rem;
      color: #666;
      margin-top: 4rem;
    }

    footer a {
      color: #aaaaaa;
      text-decoration: none;
    }

    footer a:hover {
      color: #ffffff;
    }

    h1, h2, h3 {
      color: #ffffff;
    }

    a {
      color: #7eb8d4;
    }

    a:hover {
      color: #ffffff;
    }

    hr {
      border: none;
      border-top: 1px solid #333;
      margin: 2rem 0;
    }
  </style>
</head>
<body>

  <header>
    <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
    <nav>
      <a href="{{ '/' | relative_url }}">Home</a>
      <a href="{{ '/about/' | relative_url }}">About</a>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    <p>© {{ site.time | date: "%Y" }} {{ site.title }} — Written by {{ site.author }}</p>
    <p>Questions or concerns? <a href="mailto:support@fossilproject.org">support@fossilproject.org</a></p>
  </footer>

</body>
</html>
